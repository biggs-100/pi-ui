# openspec/config.yaml
# Auto-generated by sdd-init. Edit to match project evolution.
schema: spec-driven

context: |
  Proyecto: pi-ui (fork de Hefesto)
  Stack: Electron + React 18 + TypeScript 5.7 + Vite 5.4 (electron-vite 2.3)
  Arquitectura: Main process (src/main/) → Preload (src/preload/) → Renderer (src/renderer/)
    con capa compartida (src/shared/) para tipos e IPC.
  Estado: Zustand 5.0.2
  UI: react-resizable-panels, react-markdown, shiki (syntax highlighting)
  Build: electron-vite + electron-builder (NSIS, DMG, AppImage)
  Lenguaje: Español (fork españolizado)
  Testing: No hay test runner configurado. strict_tdd: false.
  Formateo/Linter: No hay ESLint, Prettier ni formateador configurado.
  Type checking: tsc --noEmit (typecheck script)

rules:
  proposal:
    - Incluir plan de rollback para cambios riesgosos
    - Describir el impacto en español (UI, mensajes, docs)
  specs:
    - Usar Dado/Cuando/Entonces para escenarios
    - Usar palabras clave RFC 2119 (DEBE, DEBERÍA, PUEDE)
    - Escribir especificaciones en español
  design:
    - Incluir diagramas de secuencia para flujos complejos
    - Documentar decisiones de arquitectura con fundamento
  tasks:
    - Agrupar por fase, usar numeración jerárquica
    - Mantener tareas completables en una sesión
  apply:
    - Seguir patrones de código existentes
    - No añadir dependencias sin aprobación explícita
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: npm run build
    coverage_threshold: 0
  archive:
    - Advertir antes de fusionar deltas destructivos
